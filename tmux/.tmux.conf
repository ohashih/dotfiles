# 基本設定
set -g default-terminal "tmux-256color"
# truecolor (24bit) を kitty で確実に有効化
set -ag terminal-overrides ",xterm-kitty:RGB"
set -ag terminal-overrides ",*256col*:RGB"
set -s escape-time 0
set -g status-interval 1
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
# フォーカスイベント (nvim の autoread / image.nvim 連携)
set -g focus-events on

# prefixキーの割り当て(Ctrl+g)
set -g prefix C-g

# キーバインド
bind r source-file ~/.tmux.conf \; display-message "Reload config"
bind - split-window -v
bind | split-window -h
bind e setw synchronize-panes \; display "synchronize-panes #{?pane_synchronized,on,off}"

# ペインの順次移動 (Ctrl+o)
bind -n C-o select-pane -t :.+

# vim-tmux-navigator: デフォルトバインドを無効化し手動定義。
# C-l は zsh の clear-screen に残す。右移動は C-\ を使う。
# (is_vim を変数で定義する方法は tmux.conf 内では展開されないため、if-shell にコマンドを直接渡す)
set -g @vim_tmux_navigator_no_mappings 1
bind-key -n 'C-h' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-\' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" 'send-keys C-\\' 'select-pane -R'

# ペインのリサイズ
bind -n M-Right resize-pane -R 5
bind -n M-Left resize-pane -L 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# マウス操作を有効化
set -g mouse on

# コピーモードをvim風に変更
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection

# MacOS: クリップボードとの連携
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ステータスライン
set -g status-justify "centre"
set -g status-left-length 40
set -g status-right-length 150
set -g status-left "Date: %m/%d(%a) %H:%M:%S"
setw -g automatic-rename off

# プラグイン
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# nvim split と tmux pane をシームレスに移動 (C-h/j/k/l)
set -g @plugin 'christoomey/vim-tmux-navigator'
# セッションの自動保存・起動時自動復元 (resurrect と連携)
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# カラーテーマ (catppuccin) — nvim/kitty と同じ Mocha に統一
set -g @plugin 'catppuccin/tmux#v2.1.1'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_custom_window_status on
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_status_current_format " #[fg=#fab387,bg=#1e1e2e,bold]#I:#W #[default]"
set -g @catppuccin_window_status_format " #[fg=#a6adc8,bg=#161320]#I:#W #[default]"

# ステータスライト (catppuccin モジュール)
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# TPMの初期化 (最後に記述)
run ~/.tmux/plugins/tpm/tpm

# vim-tmux-navigator が root テーブルに C-h/j/k/l をバインドするが、
# シェル・アプリ (zsh clear / Claude 改行 / zsh cdup 等) のキーを守るため解放する。
# シェルからのペイン移動は C-o (順次) または prefix+矢印キーを使う。
# vim → tmux 方向のナビゲーションは vim プラグインが tmux コマンドを直接呼ぶため問題なし。
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l

# Claude code
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
